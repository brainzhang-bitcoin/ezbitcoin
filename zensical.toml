[project]
site_name = "EzBitcoin - 极简比特币讲解"
site_url = "https://ezbitcoin.brainz.fun/"
docs_dir = "docs"

[theme]
name = "material"
primary = "indigo"
accent = "indigo"
features = [
    "navigation.tabs",
    "navigation.sections",
    "navigation.top",
    "search.suggest",
    "search.highlight"
]
palette = [
    { media = "(prefers-color-scheme: light)", scheme = "default", primary = "indigo", accent = "indigo", toggle = { icon = "material/weather-night", name = "切换至暗色模式" } },
    { media = "(prefers-color-scheme: dark)", scheme = "slate", primary = "indigo", accent = "indigo", toggle = { icon = "material/weather-sunny", name = "切换至亮色模式" } }
]

